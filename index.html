<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
            text-align: center;
            width: 250px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            background: #28a745;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        .result {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Simple Calculator</h2>

    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">

    <div>
        <button onclick="add()">Add</button>
        <button onclick="subtract()">Subtract</button>
    </div>

    <div class="result" id="result"></div>
</div>

<script>
    function getValues() {
        let n1 = parseFloat(document.getElementById("num1").value) || 0;
        let n2 = parseFloat(document.getElementById("num2").value) || 0;
        return { n1, n2 };
    }

    function add() {
        let { n1, n2 } = getValues();
        let result = n1 + n2;
        document.getElementById("result").innerHTML = "Result: " + result;
    }

    function subtract() {
        let { n1, n2 } = getValues();
        let result = n1 - n2;
        document.getElementById("result").innerHTML = "Result: " + result;
    }
</script>

</body>
</html>
